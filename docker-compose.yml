services:

  # Redis
  redis:
    image: redis:7.2-alpine
    container_name: rag-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 600m

  # Redis exporter (for Prometheus)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: rag-redis-exporter
    environment:
      - REDIS_ADDR=redis://redis:6379
    ports:
      - "9121:9121"
    depends_on:
      - redis
    restart: unless-stopped

  # Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # One-shot model pull
  ollama-pull:
    image: ollama/ollama:latest
    container_name: rag-ollama-pull
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      sh -c "sleep 5 && ollama pull llama3.2:1b && echo 'Model ready'"
    volumes:
      - ollama_data:/root/.ollama
    restart: "no"

  # FastAPI (scalable — run multiple with --scale)
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    # No container_name — allows multiple replicas via --scale
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - chroma_data:/app/data/vectorstore
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"

  # Celery worker (scalable)
  rag-worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./data/raw:/app/data/raw
      - ./data/processed:/app/data/processed
      - chroma_data:/app/data/vectorstore
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped
    command: >
      celery -A src.worker.celery_app worker
      --loglevel=info
      --concurrency=2
      --max-tasks-per-child=50
      --without-gossip
      --without-mingle
      -E
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"

  # Flower
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-flower
    command: celery -A src.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
      - rag-worker
    restart: unless-stopped

  # Nginx load balancer
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: rag-nginx
    ports:
      - "80:80"
    depends_on:
      - rag-api
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost/nginx-health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3


  # Nginx exporter
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: rag-nginx-exporter
    command: --nginx.scrape-uri=http://nginx/nginx_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    restart: unless-stopped

  # Prometheus
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: rag-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:11.4.0
    container_name: rag-grafana
    ports:
      - "3000:3000"
    environment:
      # Set GRAFANA_ADMIN_USER / GRAFANA_ADMIN_PASSWORD in .env — these
      # fallbacks are local-dev only, never rely on them in production.
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-ragadmin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_ANALYTICS_REPORTING_ENABLED=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
  chroma_data:
  prometheus_data:
  grafana_data: