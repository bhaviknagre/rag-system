global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local
    project: rag-system

rule_files:
  - "alerts.yml"

scrape_configs:

  - job_name: rag_api
    static_configs:
      - targets: ["rag-api:8000"]
    metrics_path: /metrics

  - job_name: celery_worker
    static_configs:
      - targets: ["rag-flower:5555"]
    metrics_path: /metrics

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]