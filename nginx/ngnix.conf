worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────
    log_format json_combined escape=json
        '{'
            '"time":"$time_iso8601",'
            '"method":"$request_method",'
            '"uri":"$request_uri",'
            '"status":$status,'
            '"bytes":$body_bytes_sent,'
            '"duration":$request_time,'
            '"ip":"$remote_addr",'
            '"request_id":"$http_x_request_id"'
        '}';

    access_log /var/log/nginx/access.log json_combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip compression ──────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain application/json application/javascript text/css;

    # ── Rate limiting zones ───────────────────
    # ask endpoint: 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=ask_limit:10m rate=10r/s;
    # ingest endpoint: 2 requests/second per IP (heavy operation)
    limit_req_zone $binary_remote_addr zone=ingest_limit:10m rate=2r/s;
    # general: 30 requests/second per IP
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

    limit_req_status 429;
    limit_conn_status 429;

    # ── Upstream — API instances ──────────────
    # Docker Compose scaling adds rag-api_1, rag-api_2, etc.
    # Using service name — Docker's internal DNS round-robins across replicas
    upstream rag_api {
        least_conn;                      # route to least-busy instance
        server rag-api:8000;
        keepalive 32;                    # keep connections warm
    }

    # ── Main server ───────────────────────────
    server {
        listen 80;
        server_name localhost;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── Nginx health check (no upstream hit) ──
        location /nginx-health {
            access_log off;
            return 200 '{"status":"ok","service":"nginx"}';
            add_header Content-Type application/json;
        }

        # ── API health check ──────────────────
        location /health {
            limit_req zone=general_limit burst=10 nodelay;
            proxy_pass http://rag_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 10s;
        }

        # ── Ingest endpoint (rate limited hard) ──
        location /ingest {
            limit_req zone=ingest_limit burst=5 nodelay;
            proxy_pass http://rag_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 30s;      # ingest returns job_id fast, not the job itself
            proxy_connect_timeout 5s;
        }

        # ── Ask endpoint ──────────────────────
        location /ask {
            limit_req zone=ask_limit burst=20 nodelay;
            proxy_pass http://rag_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 120s;     # LLM generation can take time
            proxy_connect_timeout 5s;
        }

        # ── Jobs polling ──────────────────────
        location /jobs {
            limit_req zone=general_limit burst=30 nodelay;
            proxy_pass http://rag_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 10s;
        }

        # ── All other API routes ───────────────
        location / {
            limit_req zone=general_limit burst=20 nodelay;
            proxy_pass http://rag_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_read_timeout 60s;
            proxy_connect_timeout 5s;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── 429 rate limit response ───────────
        error_page 429 @rate_limited;
        location @rate_limited {
            default_type application/json;
            return 429 '{"detail":"Rate limit exceeded. Please slow down.","retry_after":"1s"}';
        }
    }
}