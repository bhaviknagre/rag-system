# ClusterIP Service — internal only, not exposed outside the cluster.
# DNS name inside cluster: redis-service.rag-system.svc.cluster.local
# Short form used in ConfigMap: redis-service:6379
# Every pod that has REDIS_URL=redis://redis-service:6379/0 will find this.

apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app: redis       
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP