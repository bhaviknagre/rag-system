apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  selector:
    app: redis       
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
      protocol: TCP