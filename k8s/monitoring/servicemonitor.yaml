apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: rag-api-monitor
  namespace: rag-system
  labels:
    release: prometheus-stack
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: api    
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
      - rag-system

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-monitor
  namespace: rag-system
  labels:
    release: prometheus-stack
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: redis
  endpoints:
    - port: redis
      path: /metrics
      interval: 15s
  namespaceSelector:
    matchNames:
      - rag-system