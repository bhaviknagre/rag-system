apiVersion: v1
kind: Service
metadata:
  name: rag-api-service
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  selector:
    app: rag-api
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP