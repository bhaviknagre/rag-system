apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: api
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: rag-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: rag-api
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30

      containers:
        - name: rag-api
          image: rag-api:latest
          imagePullPolicy: Never    
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: rag-config
          env:
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: PINECONE_API_KEY
            - name: MONGODB_ATLAS_URI
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: MONGODB_ATLAS_URI
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: rag-secrets
                  key: API_KEY

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"       
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 3
            timeoutSeconds: 45
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 45
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 12    
            timeoutSeconds: 45      

          volumeMounts:
            - name: raw-data
              mountPath: /app/data/raw
            - name: processed-data
              mountPath: /app/data/processed
            - name: vectorstore-data
              mountPath: /app/data/vectorstore

      volumes:
        - name: raw-data
          persistentVolumeClaim:
            claimName: raw-data-pvc
        - name: processed-data
          persistentVolumeClaim:
            claimName: processed-data-pvc
        - name: vectorstore-data
          persistentVolumeClaim:
            claimName: vectorstore-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: raw-data-pvc
  namespace: rag-system
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: processed-data-pvc
  namespace: rag-system
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vectorstore-pvc
  namespace: rag-system
  labels:
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi