# HorizontalPodAutoscaler — the K8s auto-scaling brain.
#
# How it works:
#   1. Metrics server samples CPU usage every 15s
#   2. HPA checks: current_cpu / target_cpu = scale factor
#   3. If scale factor > 1 → add pods (up to maxReplicas)
#   4. If scale factor < 1 for 5min → remove pods (down to minReplicas)
#
# Example:
#   minReplicas=2, target=50% CPU
#   Pod 1 at 90% CPU, Pod 2 at 70% CPU → avg=80%
#   Scale factor = 80/50 = 1.6 → need ceil(2 * 1.6) = 4 pods
#   HPA adds 2 pods → now 4 replicas running
#
# Scale-down is conservative (5 min cooldown) to avoid thrashing.

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: rag-api-hpa
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-api

  minReplicas: 2
  maxReplicas: 10

  metrics:
    # Scale on CPU — when average across all pods exceeds 60%
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

    # Scale on memory — when average exceeds 70%
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    # Scale UP fast — add up to 4 pods per 60s
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max

    # Scale DOWN slow — conservative to avoid thrashing
    scaleDown:
      stabilizationWindowSeconds: 300    # 5 min cooldown
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min