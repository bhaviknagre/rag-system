apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: config
data:
  # Vector DB
  VECTOR_DB_PROVIDER: "chroma"
  CHROMA_PERSIST_DIR: "/app/data/vectorstore"
  CHROMA_COLLECTION_NAME: "rag_documents"
  PINECONE_INDEX_NAME: "rag-system-index"
  MONGODB_DB_NAME: "rag_system"
  MONGODB_COLLECTION_NAME: "document_chunks"
  MONGODB_VECTOR_INDEX_NAME: "vector_index"

  # Embedding
  EMBEDDING_MODEL: "all-MiniLM-L6-v2"

  # LLM
  OLLAMA_BASE_URL: "http://ollama-service:11434"
  LLM_MODEL: "llama3.2:1b"

  # Chunking
  CHUNKING_STRATEGY: "recursive"
  CHUNK_SIZE: "800"
  CHUNK_OVERLAP: "150"

  # Retrieval
  TOP_K: "5"

  # Celery + Redis
  REDIS_URL: "redis://redis-service:6379/0"
  CELERY_BROKER_URL: "redis://redis-service:6379/0"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/0"