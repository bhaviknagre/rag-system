apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: rag-worker-scaledobject
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: worker
spec:
  # Target deployment to scale
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: rag-worker

  # Scale to zero when queue is empty (saves memory on Minikube)
  minReplicaCount: 0
  maxReplicaCount: 10

  # How long to wait before scaling down after queue empties
  cooldownPeriod: 60       # 60s cooldown before scale-to-zero

  # How often KEDA polls the scaler
  pollingInterval: 10      # check queue every 10 seconds

  triggers:
    - type: redis
      metadata:
        # Redis service DNS name inside cluster
        address: redis-service.rag-system.svc.cluster.local:6379

        # Celery's default queue name
        listName: celery

        # Scale up when queue has more than this many messages per replica
        # 2 messages per worker (each worker handles 2 concurrent tasks)
        listLength: "2"

        # Database index (matches CELERY_BROKER_URL redis://redis-service:6379/0)
        databaseIndex: "0"

---
# ScaledJob alternative — for long-running tasks that need
# one pod per job (not used here but good to know about)
# apiVersion: keda.sh/v1alpha1
# kind: ScaledJob
# Use ScaledObject (above) for persistent workers
# Use ScaledJob when each job needs a fresh isolated pod