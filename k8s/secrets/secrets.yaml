apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # REPLACE: echo -n "your-pinecone-api-key" | base64
  PINECONE_API_KEY: eW91ci1rZXktaGVyZQ==
  # REPLACE: echo -n "mongodb+srv://user:pass@cluster.mongodb.net/" | base64
  MONGODB_ATLAS_URI: eW91ci1rZXktaGVyZQ==
  # REPLACE: echo -n "$(python3 -c 'import secrets;print(secrets.token_urlsafe(32))')" | base64
  # Required by every client calling /ingest, /upload, /ask, /jobs — sent as the X-API-Key header.
  API_KEY: eW91ci1rZXktaGVyZQ==