apiVersion: v1
kind: Service
metadata:
  name: flower-service
  namespace: rag-system
  labels:
    app.kubernetes.io/name: rag-system
    app.kubernetes.io/component: flower
spec:
  type: ClusterIP
  selector:
    app: flower
  ports:
    - name: flower
      port: 5555
      targetPort: 5555
      protocol: TCP